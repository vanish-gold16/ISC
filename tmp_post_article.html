        <article class="post card" th:each="p : ${posts}">
            <div class="post__header">
                <div class="avatar">
                    <img class="avatar__img"
                         th:src="${p.user != null and p.user.profile != null and p.user.profile.avatarUrl != null}
                                 ? ${p.user.profile.avatarUrl}
                                 : '/images/private/profile/common-profile.png'"
                         alt="" />
                </div>
                <div class="post__meta">
                    <div class="post__name"
                         th:text="${p.user != null ? (p.user.firstName + ' ' + p.user.lastName) : 'ISC Member'}">ISC Member</div>
                    <div class="post__sub muted">
                        <span th:text="${p.user != null && p.user.username != null ? '@' + p.user.username : '@user'}">@user</span>
                        <span>.</span>
                        <span th:text="${p.date != null ? #temporals.format(p.date, 'dd MMM yyyy') : 'just now'}">just now</span>
                    </div>
                </div>
                <button class="icon-btn" aria-label="More" type="button"><span class="icon">...</span></button>
            </div>

            <div class="post__content">
                <img class="post__image" th:if="${p.photoUrl != null}" th:src="${p.photoUrl}" alt="" />
                <h3 class="post__title" th:if="${p.title != null}" th:text="${p.title}">Title</h3>
                <p th:text="${p.body}">Post content</p>
            </div>

            <div class="post__footer">
                <button class="action" type="button" aria-label="Like">
                    <img class="action__icon"
                         th:src="${p.liked} ? '/images/private/icons/liked.png' : '/images/private/icons/like.png'"
                         src="/images/private/icons/like.png"
                         alt="" />
                    <span class="action__count" th:text="${p.likesCount} ?: 0">0</span>
                </button>
                <button class="action" type="button" aria-label="Comment">
                    <img class="action__icon" src="/images/private/icons/comment.png" alt="" />
                    <span class="action__count" th:text="${p.commentsCount} ?: 0">0</span>
                </button>
                <button class="action" type="button" aria-label="Share">
                    <img class="action__icon" src="/images/private/icons/share.png" alt="" />
                    <span class="action__count" th:text="${p.sharesCount} ?: 0">0</span>
                </button>
            </div>
        </article>
