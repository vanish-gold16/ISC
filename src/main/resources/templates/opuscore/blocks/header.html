<header class="topbar" th:fragment="header">
    <link rel="stylesheet" th:href="@{/css/opuscore/header.css}" href="/css/opuscore/header.css" />
    <div class="topbar__inner container">
        <a class="brand" th:href="@{/opuscore}" href="/opuscore">
            <span class="brand__logo-stack">
                <img class="brand__logo-img"
                     th:src="@{/images/brand/logo-submark.png}"
                     src="/images/brand/logo-submark.png"
                     alt="" />
            </span>
            <span class="brand__text">OpusCore</span>
            <span class="brand__sub">beta</span>
        </a>

        <div class="topbar__actions">
            <a class="oc-return-badge" th:href="@{/home}" href="/home">Back to ISC</a>

            <div class="oc-notify-menu">
                <a class="oc-notify-btn" th:href="@{/notifications}" href="/notifications" aria-label="Notifications">
                    <img class="oc-notify-btn__icon"
                         th:src="@{/images/private/header/notifications.png}"
                         src="/images/private/header/notifications.png"
                         alt="" />
                    <span class="oc-notify-badge"
                          th:if="${unreadNotifications != null and unreadNotifications > 0}"
                          th:text="${unreadNotifications > 99 ? '99+' : unreadNotifications}">1</span>
                </a>

                <div class="oc-notify-dropdown" role="menu" aria-label="Latest notifications">
                    <div class="oc-notify-dropdown__head">
                        <p class="oc-notify-dropdown__title">Notifications</p>
                        <a class="oc-notify-dropdown__link" th:href="@{/notifications}" href="/notifications">View all</a>
                    </div>

                    <div th:if="${notificationsPreview != null and !#lists.isEmpty(notificationsPreview)}">
                        <a class="oc-notify-item"
                           th:href="@{/notifications/{id}/open(id=${n.notificationId})}"
                           th:each="n : ${#lists.size(notificationsPreview) > 5 ? notificationsPreview.subList(0,5) : notificationsPreview}">
                            <img class="oc-notify-item__avatar"
                                 th:src="${n.sender != null and n.sender.profile != null and n.sender.profile.avatarUrl != null} ? ${n.sender.profile.avatarUrl} : '/images/private/profile/common-profile.png'"
                                 alt="" />
                            <div class="oc-notify-item__content">
                                <p class="oc-notify-item__title" th:text="${n.title} ?: 'Notification'">Notification</p>
                                <p class="oc-notify-item__body" th:text="${n.body} ?: 'Open notifications to view details.'">Open notifications to view details.</p>
                            </div>
                        </a>
                    </div>

                    <p class="oc-notify-empty" th:if="${notificationsPreview == null or #lists.isEmpty(notificationsPreview)}">
                        No notifications yet.
                    </p>
                </div>
            </div>

            <div class="oc-profile-menu" data-profile-menu>
                <button class="oc-profile-trigger" type="button" aria-label="Open profile menu" aria-expanded="false" data-profile-trigger>
                    <img class="oc-profile-trigger__img"
                         th:src="${userAvatarUrl} ?: '/images/private/profile/common-profile.png'"
                         alt="" />
                </button>

                <nav class="oc-profile-panel" aria-label="Profile menu" data-profile-panel hidden>
                    <a class="oc-profile-item" th:href="@{/profile}">
                        <span class="oc-profile-item__title">Profile</span>
                        <span class="oc-profile-item__text">Open your public page.</span>
                    </a>
                    <a class="oc-profile-item" th:href="@{/profile/edit}">
                        <span class="oc-profile-item__title">Edit profile</span>
                        <span class="oc-profile-item__text">Avatar, bio and details.</span>
                    </a>
                    <form th:action="@{/logout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="oc-profile-item oc-profile-item--button" type="submit">
                            <span class="oc-profile-item__title">Logout</span>
                            <span class="oc-profile-item__text">End current session.</span>
                        </button>
                    </form>
                </nav>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const menus = document.querySelectorAll('[data-profile-menu]');
            if (!menus.length) return;

            menus.forEach((menu) => {
                const trigger = menu.querySelector('[data-profile-trigger]');
                const panel = menu.querySelector('[data-profile-panel]');
                if (!trigger || !panel) return;

                function closeMenu() {
                    menu.classList.remove('is-open');
                    trigger.setAttribute('aria-expanded', 'false');
                    panel.hidden = true;
                }

                function openMenu() {
                    menu.classList.add('is-open');
                    trigger.setAttribute('aria-expanded', 'true');
                    panel.hidden = false;
                }

                trigger.addEventListener('click', (event) => {
                    event.preventDefault();
                    if (menu.classList.contains('is-open')) {
                        closeMenu();
                    } else {
                        document.querySelectorAll('[data-profile-menu].is-open').forEach((otherMenu) => {
                            if (otherMenu === menu) return;
                            otherMenu.classList.remove('is-open');
                            const otherTrigger = otherMenu.querySelector('[data-profile-trigger]');
                            const otherPanel = otherMenu.querySelector('[data-profile-panel]');
                            if (otherTrigger) otherTrigger.setAttribute('aria-expanded', 'false');
                            if (otherPanel) otherPanel.hidden = true;
                        });
                        openMenu();
                    }
                });

                document.addEventListener('click', (event) => {
                    if (!menu.contains(event.target)) {
                        closeMenu();
                    }
                });

                menu.addEventListener('keydown', (event) => {
                    if (event.key === 'Escape') {
                        closeMenu();
                        trigger.focus();
                    }
                });
            });
        })();
    </script>
</header>
