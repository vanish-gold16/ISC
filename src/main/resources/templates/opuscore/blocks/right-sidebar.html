<aside class="sidebar-right sidebar-right--opuscore" th:fragment="rightSidebar(active)">
    <link rel="stylesheet" th:href="@{/css/opuscore/right-sidebar.css}" href="/css/opuscore/right-sidebar.css" />
    <div class="oc-sidebar-card">
        <div class="oc-sidebar-card__glow" aria-hidden="true"></div>
        <div class="oc-sidebar-card__eyebrow">Workspace</div>
        <div class="oc-sidebar-card__title">OpusCore</div>
        <p class="oc-sidebar-card__text">Quick actions stay in the same right rail as the main ISC layout.</p>

        <nav class="oc-sidebar-nav" aria-label="OpusCore navigation">
            <a class="oc-sidebar-action"
               th:href="@{/opuscore/new-review}"
               href="/opuscore/new-review"
               th:classappend="${active}=='new-review' ? ' is-active' : ''">
                <span class="oc-sidebar-action__icon" aria-hidden="true">+</span>
                <span class="oc-sidebar-action__content">
                    <span class="oc-sidebar-action__label">New review</span>
                    <span class="oc-sidebar-action__meta">Open the review composer</span>
                </span>
            </a>
        </nav>
    </div>
</aside>
