<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" href="/favicon.png" />
    <title th:text="${title} ?: 'OpusCore | Profile'">OpusCore | Profile</title>
    <script>
        (function () {
            try {
                const raw = sessionStorage.getItem('opuscore:transition');
                if (!raw) return;
                const state = JSON.parse(raw);
                if (!state || typeof state.ts !== 'number' || Date.now() - state.ts > 2600) {
                    sessionStorage.removeItem('opuscore:transition');
                    return;
                }
                document.documentElement.classList.add('oc-entry-pending');
                if ('scrollRestoration' in history) {
                    history.scrollRestoration = 'manual';
                }
                window.scrollTo(0, 0);
            } catch (error) {
                sessionStorage.removeItem('opuscore:transition');
            }
        })();
    </script>
    <style>
        html, body {
            min-height: 100%;
            background: #05070b;
        }

        body {
            margin: 0;
            background:
                linear-gradient(180deg, rgba(5, 7, 11, 0.24) 0%, rgba(5, 7, 11, 0.66) 100%),
                radial-gradient(circle at top, rgba(108, 142, 255, 0.16), transparent 42%),
                url('/images/private/opuscore-bg.png') center / cover no-repeat fixed,
                #05070b;
            color: #eef0f6;
        }

        html.oc-entry-pending,
        html.oc-entry-pending body {
            overflow: hidden;
        }

        html.oc-entry-pending .topbar,
        html.oc-entry-pending .page {
            opacity: 0;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/opuscore/main.css}" href="/css/opuscore/main.css" />
    <link rel="stylesheet" th:href="@{/css/opuscore/profile.css}" href="/css/opuscore/profile.css" />
</head>
<body>

<header th:replace="~{/opuscore/blocks/header :: header}"></header>

<main class="container page oc-profile-page">
    <section class="page-content">
        <section class="oc-profile-card glass-panel">
            <div class="oc-profile-cover">
                <img th:src="${profileCoverUrl}" src="/images/private/profile/common-cover.png" alt="" />
                <div class="oc-profile-cover__veil"></div>
            </div>

            <div class="oc-profile-body">
                <div class="oc-profile-avatar-shell">
                    <div class="oc-profile-avatar">
                        <img th:src="${profileAvatarUrl}" src="/images/private/profile/common-profile.png" alt="" />
                    </div>
                    <span class="oc-profile-avatar__status"
                          th:classappend="${profileOnline} ? ' is-online' : ' is-offline'"></span>
                </div>

                <div class="oc-profile-copy">
                    <h1 class="oc-profile-name"
                        th:text="${profileUser != null ? (profileUser.firstName + ' ' + profileUser.lastName) : 'ISC Member'}">
                        ISC Member
                    </h1>
                    <p class="oc-profile-username"
                       th:text="${profileUser != null && profileUser.username != null ? '@' + profileUser.username : '@username'}">
                        @username
                    </p>
                    <div class="oc-profile-status">
                        <span class="oc-profile-status__dot"
                              th:classappend="${profileOnline} ? ' is-online' : ' is-offline'"></span>
                        <span th:text="${profileOnline} ? 'Online now' : 'Offline'">Offline</span>
                    </div>
                </div>
            </div>
        </section>
    </section>

    <aside th:replace="~{/opuscore/blocks/right-sidebar :: rightSidebar('profile')}"></aside>
</main>

<script th:src="@{/js/private/opuscore-transition.js}" src="/js/private/opuscore-transition.js"></script>
</body>
</html>
