<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" href="/favicon.png" />
    <title th:text="${review != null && review.artName != null} ? ${'OpusCore | ' + review.artName} : 'OpusCore | Review'">OpusCore | Review</title>
    <script>
        (function () {
            try {
                const raw = sessionStorage.getItem('opuscore:transition');
                if (!raw) return;
                const state = JSON.parse(raw);
                if (!state || typeof state.ts !== 'number' || Date.now() - state.ts > 2600) {
                    sessionStorage.removeItem('opuscore:transition');
                    return;
                }
                document.documentElement.classList.add('oc-entry-pending');
                if ('scrollRestoration' in history) {
                    history.scrollRestoration = 'manual';
                }
                window.scrollTo(0, 0);
            } catch (error) {
                sessionStorage.removeItem('opuscore:transition');
            }
        })();
    </script>
    <style>
        html, body {
            min-height: 100%;
            background: #05070b;
        }

        body {
            margin: 0;
            background:
                linear-gradient(180deg, rgba(5, 7, 11, 0.24) 0%, rgba(5, 7, 11, 0.66) 100%),
                radial-gradient(circle at top, rgba(108, 142, 255, 0.16), transparent 42%),
                url('/images/private/opuscore-bg.png') center / cover no-repeat fixed,
                #05070b;
            color: #eef0f6;
        }

        html.oc-entry-pending,
        html.oc-entry-pending body {
            overflow: hidden;
        }

        html.oc-entry-pending .topbar,
        html.oc-entry-pending .page {
            opacity: 0;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/opuscore/main.css}" href="/css/opuscore/main.css" />
    <link rel="stylesheet" th:href="@{/css/opuscore/review.css}" href="/css/opuscore/review.css" />
</head>
<body>

<header th:replace="~{/opuscore/blocks/header :: header}"></header>
<header class="topbar" hidden>
    <div class="topbar__inner container">
        <a class="brand" href="/opuscore">
            <span class="brand__logo-stack">
                <img class="brand__logo-img"
                     th:src="@{/images/brand/logo-submark.png}"
                     src="/images/brand/logo-submark.png"
                     alt="" />
            </span>
            <span class="brand__text">OpusCore</span>
            <span class="brand__sub">beta</span>
        </a>
        <div class="topbar__actions">
            <a class="btn" href="/opuscore">&larr; Back</a>
        </div>
    </div>
</header>

<main class="container page review-page"
      th:with="displayCover=${review != null ? review.displayPhotoUrl : (artwork != null ? artwork.coverUrl : null)},
               displayName=${review != null && review.artName != null ? review.artName : 'Untitled Work'},
               displayAuthor=${review != null && review.artAuthor != null ? review.artAuthor : 'Unknown creator'},
               displayDescription=${review != null ? review.artDescription : null}">
    <section class="page-content">
    <section class="review-hero">
        <div th:if="${displayCover != null}"
             class="review-cover"
             data-cover-frame>
            <img th:src="${displayCover}" th:alt="${displayName}" data-cover-image alt="Cover" />
        </div>
        <div th:if="${displayCover == null}" class="review-cover">
            <div class="review-cover__placeholder">
                <span>NO COVER</span>
            </div>
        </div>

        <div class="review-info">
            <div class="review-topline">
                <div class="review-topline__main">
                    <div class="review-tag">
                        <span class="dot"></span>
                        <span th:text="${review != null && review.type != null} ? ${review.type} : 'ART'">ART</span>
                    </div>
                    <h1 class="review-title">
                        <a th:if="${artwork != null}"
                           class="review-title__link"
                           th:href="@{/opuscore/art-page/{id}(id=${artwork.id})}"
                           th:text="${displayName}"
                           href="/opuscore/art-page/1">Untitled Work</a>
                        <span th:if="${artwork == null}" th:text="${displayName}">Untitled Work</span>
                    </h1>
                    <p class="review-work-author" th:text="${displayAuthor}">
                        Unknown creator
                    </p>

                    <th:block th:with="heroDescription=${displayDescription}">
                        <div class="review-desc-wrap" th:if="${heroDescription != null && !#strings.isEmpty(heroDescription)}">
                            <p class="review-desc review-desc--clamped" id="review-desc" th:text="${heroDescription}">
                                Short description about the work.
                            </p>
                            <button class="review-desc__toggle" id="review-desc-toggle" type="button" hidden>Show more</button>
                        </div>
                    </th:block>
                </div>

                <div class="review-side">
                    <a class="review-edit"
                       th:if="${user != null and reviewAuthorId != null and review != null and review.id != null and user.id == reviewAuthorId}"
                       th:href="@{/opuscore/{id}/edit(id=${review.id})}"
                       href="/opuscore/1/edit"
                       aria-label="Edit review">
                        <img class="review-edit__icon"
                             th:src="@{/images/private/icons/edit.png}"
                             src="/images/private/icons/edit.png"
                             alt="" />
                        <span>Edit</span>
                    </a>

                    <a class="review-author"
                       th:if="${reviewAuthorId != null}"
                       th:href="@{/opuscore/profile/{id}(id=${reviewAuthorId})}"
                       href="/opuscore/profile/1">
                        <span class="review-author__label">by</span>
                        <img class="review-author__avatar"
                             th:src="${reviewAuthorAvatarUrl} ?: '/images/private/profile/common-profile.png'"
                             src="/images/private/profile/common-profile.png"
                             alt="" />
                        <span class="review-author__name" th:text="${reviewAuthorUsername} ?: 'isc-user'">isc-user</span>
                    </a>

                    <div class="review-score">
                        <span class="review-score__value" th:text="${review != null && review.value != null} ? ${review.value} : '0'">0</span>
                        <span class="review-score__max">/100</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="review-body">
        <div class="review-section">
            <div class="section-title">Review</div>
            <p th:text="${review != null && review.body != null} ? ${review.body} : 'No review text yet.'">No review text yet.</p>
        </div>

        <div class="review-section">
            <div class="section-title">Criteria scores</div>
            <div class="criteria-grid" th:if="${criteriaScores != null}">
                <div class="criteria-card" th:each="c : ${criteriaScores}">
                    <div class="criteria-header">
                        <div>
                            <div class="criteria-name" th:text="${c.name} ?: 'Criterion'">Criterion</div>
                            <div class="criteria-desc" th:text="${c.description} ?: 'Description'">Description</div>
                        </div>
                        <div class="criteria-score">
                            <span class="criteria-score__value" th:text="${c.score} ?: '0'">0</span>
                            <span class="criteria-score__max">/10</span>
                        </div>
                    </div>
                    <div class="criteria-bar">
                        <div class="criteria-bar__fill" th:style="${'width:' + ((c.score != null ? c.score : 0) * 10) + '%'}"></div>
                    </div>
                </div>
            </div>
            <div class="criteria-empty" th:if="${criteriaScores == null}">No criteria set yet.</div>
        </div>
    </section>
    </section>
    <aside th:replace="~{/opuscore/blocks/right-sidebar :: rightSidebar('review')}"></aside>
</main>

<script th:src="@{/js/private/opuscore-cover-frames.js}" src="/js/private/opuscore-cover-frames.js"></script>
<script th:src="@{/js/private/opuscore-transition.js}" src="/js/private/opuscore-transition.js"></script>
<script>
    (function () {
        const description = document.getElementById('review-desc');
        const toggle = document.getElementById('review-desc-toggle');
        if (!description || !toggle) {
            return;
        }

        const collapsedClass = 'review-desc--clamped';

        const syncToggle = () => {
            description.classList.add(collapsedClass);
            const needsToggle = description.scrollHeight > description.clientHeight + 4;
            toggle.hidden = !needsToggle;
            if (!needsToggle) {
                description.classList.remove('is-expanded');
                toggle.textContent = 'Show more';
            }
        };

        toggle.addEventListener('click', () => {
            description.classList.toggle('is-expanded');
            const expanded = description.classList.contains('is-expanded');
            toggle.textContent = expanded ? 'Show less' : 'Show more';
        });

        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(syncToggle);
        } else {
            window.addEventListener('load', syncToggle, { once: true });
        }

        window.addEventListener('resize', syncToggle);
        syncToggle();
    })();
</script>
</body>
</html>
