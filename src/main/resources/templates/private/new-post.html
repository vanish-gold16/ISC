<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" href="/favicon.png" />

    <title th:text="${title} ?: 'ISC | New Post'">ISC | New Post</title>

    <link rel="stylesheet" href="/css/private/new-post.css" />
</head>

<body>
<header th:replace="~{private/blocks/private-header :: header}"></header>

<main class="container page new-post-page">
    <section class="new-post">
        <header class="card new-post__head">
            <div>
                <h1>New post</h1>
                <p class="muted">Share an update with the community.</p>
            </div>
        </header>

        <form class="card new-post__form" th:action="@{/post}" th:object="${form}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="field">
                <label for="title">Title</label>
                <input id="title" class="input" type="text" th:field="*{title}" placeholder="Short headline" maxlength="50" />
                <p class="field__error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Title error</p>
            </div>

            <div class="field">
                <label for="body">Body</label>
                <textarea id="body" class="input input--textarea" rows="6" th:field="*{body}" placeholder="What’s happening?" maxlength="200"></textarea>
                <p class="field__hint muted">Max 200 characters.</p>
                <p class="field__error" th:if="${#fields.hasErrors('body')}" th:errors="*{body}">Body error</p>
            </div>

            <div class="field">
                <label for="photo">Photo (optional)</label>
                <input id="photo" class="input input--file" type="file" th:field="*{photo}" accept="image/*" />
                <p class="field__hint muted">JPG/PNG/WEBP, up to 5MB.</p>
                <div class="photo-preview" id="photo-preview" hidden>
                    <img id="photo-preview-img" alt="" />
                    <button class="btn btn--ghost btn--sm" type="button" id="photo-clear">Remove photo</button>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn--primary" type="submit">Publish</button>
                <a class="btn btn--ghost" th:href="@{/profile}">Cancel</a>
            </div>

            <p class="form-error" th:if="${error}" th:text="${error}">Upload error</p>
        </form>
    </section>

    <aside th:replace="~{/private/blocks/right-sidebar :: rightSidebar('post')}"></aside>
</main>

<footer th:replace="~{private/blocks/private-footer :: footer}"></footer>

<script>
    (function () {
        const input = document.getElementById('photo');
        const preview = document.getElementById('photo-preview');
        const img = document.getElementById('photo-preview-img');
        const clear = document.getElementById('photo-clear');

        if (!input || !preview || !img || !clear) return;

        input.addEventListener('change', () => {
            const file = input.files && input.files[0];
            if (!file) {
                preview.hidden = true;
                img.src = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                img.src = String(e.target.result || '');
                preview.hidden = false;
            };
            reader.readAsDataURL(file);
        });

        clear.addEventListener('click', () => {
            input.value = '';
            preview.hidden = true;
            img.src = '';
        });
    })();
</script>
</body>
</html>
