<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" href="/favicon.png" />

    <title th:text="${title} ?: 'ISC | Post'">ISC | Post</title>

    <link rel="stylesheet" href="/css/private/home.css" />
    <style>
        .post-page {
            min-width: 0;
            display: grid;
            gap: 14px;
        }
        .comment-form {
            display: grid;
            gap: 10px;
        }
        .comment-input {
            width: 100%;
            min-height: 90px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            resize: vertical;
            background: #ffffff;
            color: var(--text);
        }
        .comment {
            padding: 12px;
        }
        .comment__head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .comment__name {
            font-weight: 700;
        }
        .comment__meta {
            font-size: 12px;
        }
    </style>
</head>

<body>
<header th:replace="~{private/blocks/private-header :: header}"></header>

<main class="container page">
    <section class="post-page">
        <article class="post card">
            <div class="post__header">
                <div class="avatar">
                    <img class="avatar__img"
                         th:src="${post.user != null and post.user.profile != null and post.user.profile.avatarUrl != null}
                                 ? ${post.user.profile.avatarUrl}
                                 : '/images/private/profile/common-profile.png'"
                         alt="" />
                </div>
                <div class="post__meta">
                    <div class="post__name"
                         th:text="${post.user != null ? (post.user.firstName + ' ' + post.user.lastName) : 'ISC Member'}">ISC Member</div>
                    <div class="post__sub muted">
                        <span th:text="${post.user != null && post.user.username != null ? '@' + post.user.username : '@user'}">@user</span>
                    </div>
                </div>
            </div>

            <div class="post__content">
                <img class="post__image" th:if="${post.photoUrl != null}" th:src="${post.photoUrl}" alt="" />
                <h3 class="post__title" th:if="${post.title != null}" th:text="${post.title}">Title</h3>
                <p th:text="${post.body}">Post content</p>
            </div>

            <div class="post__footer">
                <form class="action-form" method="post" th:action="@{/posts/{id}/like(id=${post.id})}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button class="action" type="submit" aria-label="Like">
                        <img class="action__icon"
                             th:src="${post.liked} ? '/images/private/icons/liked.png' : '/images/private/icons/like.png'"
                             src="/images/private/icons/like.png"
                             alt="" />
                        <span class="action__count" th:text="${post.likesCount} ?: 0">0</span>
                    </button>
                </form>
                <button class="action" type="button" aria-label="Comment">
                    <img class="action__icon" src="/images/private/icons/comment.png" alt="" />
                    <span class="action__count" th:text="${post.commentsCount} ?: 0">0</span>
                </button>
                <button class="action" type="button" aria-label="Share">
                    <img class="action__icon" src="/images/private/icons/share.png" alt="" />
                    <span class="action__count" th:text="${post.sharesCount} ?: 0">0</span>
                </button>
            </div>
            <div class="post__date muted" th:text="${post.date != null ? #temporals.format(post.date, 'dd MMM yyyy') : 'just now'}">just now</div>
        </article>

        <article class="card" style="padding: 12px;">
            <h3>Comments</h3>
            <form class="comment-form" method="post" th:action="@{/posts/{id}/comment(id=${post.id})}" th:object="${commentForm}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <textarea class="comment-input" th:field="*{text}" maxlength="100" placeholder="Write a comment..."></textarea>
                <button class="btn btn--primary" type="submit">Send</button>
            </form>
        </article>

        <div class="card comment" th:each="c : ${comments}">
            <div class="comment__head">
                <div class="comment__name" th:text="${c.user != null ? (c.user.firstName + ' ' + c.user.lastName) : 'ISC Member'}">ISC Member</div>
                <div class="comment__meta muted" th:text="${c.user != null && c.user.username != null ? '@' + c.user.username : '@user'}">@user</div>
            </div>
            <p th:text="${c.text}">Comment text</p>
        </div>

        <div class="card empty" th:if="${comments == null or #lists.isEmpty(comments)}">
            <h3>No comments yet</h3>
            <p class="muted">Be the first to reply.</p>
        </div>
    </section>

    <aside th:replace="~{/private/blocks/right-sidebar :: rightSidebar('home')}"></aside>
</main>

<footer th:replace="~{private/blocks/private-footer :: footer}"></footer>
</body>
</html>
