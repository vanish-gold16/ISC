<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" href="/favicon.png" />

    <title th:text="${title} ?: 'ISC | Post'">ISC | Post</title>

    <link rel="stylesheet" href="/css/private/home.css" />
    <style>
        .post-page {
            min-width: 0;
            display: grid;
            gap: 14px;
        }
        .comment-form {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .comment-input {
            width: 100%;
            min-height: 54px;
            height: 54px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            resize: none;
            background: #ffffff;
            color: var(--text);
        }
        .comment-upload {
            display: inline-flex;
            align-items: center;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
        }
        .comment-upload img {
            width: 26px;
            height: 26px;
            object-fit: contain;
            display: block;
        }
        .comment-media-slot {
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
        }
        .comment {
            padding: 12px;
        }
        .comment__actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }
        .comment__replies-count {
            font-size: 12px;
        }
        .comment__reply-form {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }
        .comment__reply-form--visible {
            display: flex;
        }
        .comment__reply-form textarea {
            min-height: 48px;
            resize: vertical;
        }
        .comment__replies {
            margin-top: 12px;
            padding-left: 12px;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .comment__replies .card.comment {
            margin-left: 4px;
            padding-left: 8px;
        }
        .comment__head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .comment__name {
            font-weight: 700;
        }
        .comment__friend-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 999px;
            background: #dcfce7;
            color: #166534;
            border: 1px solid rgba(22, 101, 52, 0.2);
            font-weight: 600;
        }
        .comment__meta {
            font-size: 12px;
        }
        .comment__head a {
            color: inherit;
            text-decoration: none;
        }
        .comment__head a:hover {
            text-decoration: underline;
        }
        .comment__text {
            margin: 10px 0 6px;
        }
        .post__header {
            cursor: pointer;
        }
        .post__header:focus-visible {
            outline: 2px solid #1d4ed8;
            outline-offset: 2px;
        }
        html, body {
            height: auto;
        }
        body {
            min-height: 100vh;
            overflow-y: auto;
        }
    </style>
</head>

<body>
<header th:replace="~{private/blocks/private-header :: header}"></header>

<main class="container page">
    <section class="post-page">
        <article class="post card">
            <div class="post__header"
                 role="link"
                 tabindex="0"
                 th:attr="data-user-profile-url=@{/posts/{id}/to-profile(id=${post.id})}">
                <div class="avatar">
                    <img class="avatar__img"
                         th:src="${post.user != null and post.user.profile != null and post.user.profile.avatarUrl != null}
                                 ? ${post.user.profile.avatarUrl}
                                 : '/images/private/profile/common-profile.png'"
                         alt="" />
                </div>
                <div class="post__meta">
                    <div>
                        <div class="post__name"
                             th:text="${post.user != null ? (post.user.firstName + ' ' + post.user.lastName) : 'ISC Member'}">ISC Member</div>
                        <div class="post__sub muted">
                            <span th:text="${post.user != null && post.user.username != null ? '@' + post.user.username : '@user'}">@user</span>
                        </div>
                        <div class="user-status post__status-line" th:if="${post.user != null}"
                             th:attr="data-user-id=${post.user.id}">
                            <span class="user-status__dot" aria-hidden="true"></span>
                            <div class="user-status__copy">
                                <span class="user-status__text" aria-live="polite">Loading status...</span>
                                <span class="user-status__secondary" aria-live="polite"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="post__content">
                <img class="post__image" th:if="${post.photoUrl != null}" th:src="${post.photoUrl}" alt="" />
                <h3 class="post__title" th:if="${post.title != null}" th:text="${post.title}">Title</h3>
                <p th:text="${post.body}">Post content</p>
            </div>

            <div class="post__footer">
                <form class="action-form" method="post" th:action="@{/posts/{id}/like(id=${post.id})}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button class="action action--like" type="submit" aria-label="Like"
                            th:attr="data-liked=${post.liked},data-like-icon=@{/images/private/icons/like.png},data-liked-icon=@{/images/private/icons/liked.png}">
                        <img class="action__icon"
                             th:src="${post.liked} ? '/images/private/icons/liked.png' : '/images/private/icons/like.png'"
                             src="/images/private/icons/like.png"
                             alt="" />
                        <span class="action__count" th:text="${post.likesCount} ?: 0">0</span>
                    </button>
                </form>
                <button class="action" type="button" aria-label="Comment">
                    <img class="action__icon" src="/images/private/icons/comment.png" alt="" />
                    <span class="action__count" th:text="${post.commentsCount} ?: 0">0</span>
                </button>
                <button class="action action--share" type="button" aria-label="Share">
                    <img class="action__icon" src="/images/private/icons/share.png" alt="" />
                    <span class="action__count" th:text="${post.sharesCount} ?: 0">0</span>
                </button>
            </div>
            <div class="post__date muted" th:text="${post.date != null ? #temporals.format(post.date, 'dd MMM yyyy') : 'just now'}">just now</div>
        </article>

        <article class="card" style="padding: 12px;">
            <h3>Comments</h3>
            <form class="comment-form" method="post" th:action="@{/posts/{id}/comment(id=${post.id})}" th:object="${commentForm}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <textarea class="comment-input" th:field="*{text}" maxlength="100" placeholder="Write a comment..."></textarea>
                <button class="comment-upload" type="submit" aria-label="Send comment">
                    <img src="/images/private/comments/comment-upload.png" alt="" />
                </button>
            </form>
            <div class="comment-media-slot">Image placeholder: /images/private/comments/comment-upload.png</div>
        </article>

        <div class="comment-list" th:if="${commentViews != null and !#lists.isEmpty(commentViews)}">
            <div th:each="commentView : ${commentViews}">
                <div th:replace="~{this :: commentCard(commentView=${commentView}, post=${post})}"></div>
            </div>
        </div>

        <div class="comment-list"
             th:if="${commentViews == null or #lists.isEmpty(commentViews)}">
            <div class="card empty">
                <h3>No comments yet</h3>
                <p class="muted">Be the first to reply.</p>
            </div>
        </div>

        <th:block th:fragment="commentCard(commentView, post)" th:remove="tag">
            <th:block th:if="${commentView != null}">
            <article class="card comment" th:classappend="${!#lists.isEmpty(commentView.replies)} ? ' comment--has-replies' : ''">
                <div class="comment__head">
                    <a class="comment__name"
                       th:if="${commentView.authorId != null}"
                       th:href="@{/profile/{id}(id=${commentView.authorId})}"
                       th:text="${commentView.authorName != null ? commentView.authorName : 'ISC Member'}">ISC Member</a>
                    <div class="comment__name"
                         th:if="${commentView.authorId == null}"
                         th:text="${commentView.authorName != null ? commentView.authorName : 'ISC Member'}">ISC Member</div>
                    <span class="comment__friend-badge" th:if="${commentView.friendAuthor}">Friend</span>
                    <a class="comment__meta muted"
                       th:if="${commentView.authorId != null and commentView.authorUsername != null}"
                       th:href="@{/profile/{id}(id=${commentView.authorId})}"
                       th:text="${'@' + commentView.authorUsername}">@user</a>
                    <div class="comment__meta muted"
                         th:if="${commentView.authorId == null or commentView.authorUsername == null}"
                         th:text="${commentView.authorUsername != null ? '@' + commentView.authorUsername : '@user'}">@user</div>
                </div>
                <p class="comment__text" th:text="${commentView.text}">Comment text</p>
                <div class="comment__actions">
                    <form class="action-form" method="post"
                          th:action="@{/posts/{postId}/comments/{commentId}/like(postId=${post.id}, commentId=${commentView.id})}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="action action--like" type="submit" aria-label="Like"
                                th:attr="data-liked=${commentView.liked},data-like-icon=@{/images/private/icons/like.png},data-liked-icon=@{/images/private/icons/liked.png}">
                            <img class="action__icon"
                                 th:src="${commentView.liked} ? '/images/private/icons/liked.png' : '/images/private/icons/like.png'"
                                 alt="" />
                            <span class="action__count" th:text="${commentView.likes ?: 0}">0</span>
                        </button>
                    </form>
                    <button class="action action--reply" type="button" data-comment-reply-toggle>
                        <img class="action__icon" src="/images/private/icons/comment.png" alt="" />
                        <span class="action__label">Reply</span>
                    </button>
                    <span class="comment__replies-count muted" th:if="${commentView.repliesCount > 0}"
                          th:text="${commentView.repliesCount} + ' replies'">0 replies</span>
                </div>
                <form class="comment__reply-form" method="post"
                      th:action="@{/posts/{postId}/comment/{commentId}/reply(postId=${post.id}, commentId=${commentView.id})}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <textarea class="comment-input" name="text" maxlength="100" placeholder="Reply..." rows="2"></textarea>
                    <button class="comment-upload" type="submit" aria-label="Send reply">
                        <img src="/images/private/comments/comment-upload.png" alt="" />
                    </button>
                </form>
                <div class="comment__replies" th:if="${commentView != null and !#lists.isEmpty(commentView.replies)}">
                    <div th:each="reply : ${commentView.replies}">
                        <div th:replace="~{this :: commentCard(commentView=${reply}, post=${post})}"></div>
                    </div>
                </div>
            </article>
            </th:block>
        </th:block>
    </section>

    <aside th:replace="~{/private/blocks/right-sidebar :: rightSidebar('home')}"></aside>
</main>

<footer th:replace="~{private/blocks/private-footer :: footer}"></footer>
<script>
    (function () {
        const headers = Array.from(document.querySelectorAll('.post__header[data-user-profile-url]'));
        if (!headers.length) return;
        const ignoreSelector = '.icon-btn, .action, .action-form, button, form, input, textarea';
        headers.forEach(header => {
            const url = header.getAttribute('data-user-profile-url');
            if (!url) return;
            header.addEventListener('click', (e) => {
                if (e.target.closest(ignoreSelector)) return;
                e.stopPropagation();
                window.location.href = url;
            });
            header.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    if (e.target.closest(ignoreSelector)) return;
                    window.location.href = url;
                }
            });
        });
    })();
</script>
<script>
    (function () {
        const forms = Array.from(document.querySelectorAll('.action-form'));
        if (!forms.length || !window.fetch) return;
        forms.forEach(form => {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const url = form.getAttribute('action');
                const csrf = form.querySelector('input[name=\"_csrf\"]');
                const btn = form.querySelector('button.action');
                const img = btn ? btn.querySelector('.action__icon') : null;
                const count = btn ? btn.querySelector('.action__count') : null;
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'X-CSRF-TOKEN': csrf ? csrf.value : '',
                            'Accept': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    });
                    if (!res.ok) {
                        form.submit();
                        return;
                    }
                    const data = await res.json();
                    if (btn) {
                        btn.setAttribute('data-liked', data.liked ? 'true' : 'false');
                        if (img) {
                            const likeIcon = btn.getAttribute('data-like-icon');
                            const likedIcon = btn.getAttribute('data-liked-icon');
                            img.src = data.liked ? likedIcon : likeIcon;
                        }
                    }
                    if (count && typeof data.likesCount !== 'undefined') {
                        count.textContent = data.likesCount;
                    }
                } catch (err) {
                    form.submit();
                }
            });
        });
    })();
</script>
<script>
    (function () {
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-comment-reply-toggle]');
            if (!btn) return;
            const card = btn.closest('.card.comment');
            if (!card) return;
            const form = card.querySelector('.comment__reply-form');
            if (!form) return;
            form.classList.toggle('comment__reply-form--visible');
            const isOpen = form.classList.contains('comment__reply-form--visible');
            btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            if (isOpen) {
                const textarea = form.querySelector('textarea');
                if (textarea) {
                    textarea.focus();
                }
            }
        });
    })();
</script>
<script src="/js/user-status.js" defer></script>
</body>
</html>
