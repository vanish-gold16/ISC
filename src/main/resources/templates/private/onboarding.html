<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" href="/favicon.png" />

    <title>ISC | Onboarding</title>

    <link rel="stylesheet" href="/css/private/profile.css" />
    <link rel="stylesheet" href="/css/private/onboarding.css" />
</head>
<body>
<header th:replace="~{private/blocks/private-header :: header}"></header>

<main class="container onboarding">
    <section class="card onboarding__card">
        <div class="onboarding__top">
            <h1>Complete your profile</h1>
            <a class="btn btn--ghost" th:href="@{/home}">Skip for now</a>
        </div>
        <p class="muted">This step is optional. You can fill everything later from your profile.</p>
        <p class="error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>

        <form class="form" method="post" th:action="@{/onboarding}" th:object="${form}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" th:field="*{avatarUrl}" id="avatarUrl" />
            <input type="hidden" th:field="*{coverUrl}" id="coverUrl" />
            <label class="field">
                <span>Bio</span>
                <textarea class="input input--textarea" th:field="*{bio}" maxlength="300" placeholder="Tell a bit about yourself"></textarea>
                <small class="error" th:if="${#fields.hasErrors('bio')}" th:errors="*{bio}"></small>
            </label>

            <div class="grid2">
                <label class="field">
                    <span>Country</span>
                    <select class="input" th:field="*{country}">
                        <option value="">Not specified</option>
                        <option th:each="country : ${countries}"
                                th:value="${country.name()}"
                                th:text="${#strings.replace(country.name(), '_', ' ')}">
                        </option>
                    </select>
                </label>

                <label class="field">
                    <span>City</span>
                    <input class="input" th:field="*{city}" maxlength="80" placeholder="City" />
                    <small class="error" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></small>
                </label>
            </div>

            <div class="grid2">
                <label class="field">
                    <span>Current study</span>
                    <input class="input" th:field="*{currentStudy}" maxlength="120" placeholder="University / Program" />
                    <small class="error" th:if="${#fields.hasErrors('currentStudy')}" th:errors="*{currentStudy}"></small>
                </label>

                <label class="field">
                    <span>Occupation</span>
                    <select class="input" th:field="*{occupationEnum}">
                        <option value="">Not specified</option>
                        <option th:each="occupation : ${occupations}"
                                th:value="${occupation.name()}"
                                th:text="${occupation.displayName}">
                        </option>
                    </select>
                </label>
            </div>

            <div class="grid2 onboarding-media">
                <div class="image-section">
                    <label class="field-label" for="coverUpload">Cover</label>
                    <div class="media-preview media-preview--cover">
                        <img id="coverPreview"
                             class="preview-cover"
                             th:src="${form.coverUrl != null and !#strings.isEmpty(form.coverUrl)} ? ${form.coverUrl} : '/images/private/profile/common-cover.png'"
                             src="/images/private/profile/common-cover.png"
                             alt="Cover preview" />
                    </div>
                    <input id="coverUpload"
                           type="file"
                           name="cover"
                           accept="image/png, image/jpeg, image/webp"
                           onchange="openCropper(event, 'cover')" />
                    <p class="upload-status" id="coverUploadStatus" aria-live="polite"></p>
                </div>

                <div class="image-section">
                    <label class="field-label" for="avatarUpload">Avatar</label>
                    <div class="media-preview media-preview--avatar">
                        <img id="avatarPreview"
                             class="preview-avatar"
                             th:src="${form.avatarUrl != null and !#strings.isEmpty(form.avatarUrl)} ? ${form.avatarUrl} : '/images/private/profile/common-profile.png'"
                             src="/images/private/profile/common-profile.png"
                             alt="Avatar preview" />
                    </div>
                    <input id="avatarUpload"
                           type="file"
                           name="avatar"
                           accept="image/png, image/jpeg, image/webp"
                           onchange="openCropper(event, 'avatar')" />
                    <p class="upload-status" id="avatarUploadStatus" aria-live="polite"></p>
                </div>
            </div>

            <label class="field">
                <span>Birth date</span>
                <input class="input" type="date" th:field="*{birthDate}" />
                <small class="error" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></small>
            </label>

            <div class="actions">
                <button class="btn btn--primary" type="submit">Save and continue</button>
                <a class="btn btn--ghost" th:href="@{/home}">Skip for now</a>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{private/blocks/private-footer :: footer}"></footer>
<div class="cropper-modal hidden" id="cropper-modal" aria-hidden="true">
    <div class="cropper-dialog" role="dialog" aria-modal="true" aria-labelledby="cropper-title">
        <div class="cropper-head">
            <h3 id="cropper-title">Adjust image</h3>
            <button class="btn btn--ghost btn--sm" type="button" id="cropper-cancel">Cancel</button>
        </div>
        <div class="cropper-body">
            <canvas id="cropper-canvas" width="600" height="400"></canvas>
        </div>
        <div class="cropper-controls">
            <label class="cropper-zoom">
                <span>Scale</span>
                <input id="cropper-zoom" type="range" min="1" max="3" step="0.01" value="1" />
            </label>
            <button class="btn btn--primary" type="button" id="cropper-apply">Apply</button>
        </div>
    </div>
</div>
<script>
    const cropperModal = document.getElementById('cropper-modal');
    const cropperCanvas = document.getElementById('cropper-canvas');
    const cropperCtx = cropperCanvas.getContext('2d');
    const cropperZoom = document.getElementById('cropper-zoom');
    const cropperApply = document.getElementById('cropper-apply');
    const cropperCancel = document.getElementById('cropper-cancel');

    let cropperState = null;
    let cropperImg = null;
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    const uploadStates = {};
    const onboardingForm = document.querySelector('form.form');

    function openCropper(event, kind) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        const inputEl = event.target;

        const config = kind === 'avatar'
            ? { width: 400, height: 400, url: '/profile/edit/avatar', previewId: 'avatarPreview', fieldId: 'avatarUrl', statusId: 'avatarUploadStatus' }
            : { width: 1600, height: 400, url: '/profile/edit/cover', previewId: 'coverPreview', fieldId: 'coverUrl', statusId: 'coverUploadStatus' };

        cropperImg = new Image();
        cropperImg.onload = () => {
            cropperCanvas.width = config.width;
            cropperCanvas.height = config.height;

            const baseScale = Math.max(
                cropperCanvas.width / cropperImg.width,
                cropperCanvas.height / cropperImg.height
            );

            cropperState = {
                inputEl,
                config,
                baseScale,
                zoom: 1,
                offsetX: 0,
                offsetY: 0
            };

            cropperZoom.value = '1';
            drawCropper();
            showCropper();
        };
        cropperImg.src = URL.createObjectURL(file);
    }

    function ensureUploadState(config) {
        const key = config.fieldId;
        if (!uploadStates[key]) {
            uploadStates[key] = { token: 0, pending: false, promise: null };
        }
        return uploadStates[key];
    }

    function setUploadStatus(config, text, isError) {
        if (!config || !config.statusId) return;
        const status = document.getElementById(config.statusId);
        if (!status) return;
        status.textContent = text || '';
        status.classList.toggle('upload-status--error', Boolean(isError));
    }

    function showLocalPreview(config, file) {
        const preview = document.getElementById(config.previewId);
        if (!preview) return;
        if (preview.dataset.localObjectUrl) {
            URL.revokeObjectURL(preview.dataset.localObjectUrl);
        }
        const localUrl = URL.createObjectURL(file);
        preview.dataset.localObjectUrl = localUrl;
        preview.src = localUrl;
    }

    function showUploadedPreview(config, src) {
        const preview = document.getElementById(config.previewId);
        if (!preview) return;
        if (preview.dataset.localObjectUrl) {
            URL.revokeObjectURL(preview.dataset.localObjectUrl);
            preview.dataset.localObjectUrl = '';
        }
        preview.src = src;
    }

    function showCropper() {
        cropperModal.classList.remove('hidden');
        cropperModal.setAttribute('aria-hidden', 'false');
    }

    function hideCropper() {
        cropperModal.classList.add('hidden');
        cropperModal.setAttribute('aria-hidden', 'true');
        cropperImg = null;
        cropperState = null;
    }

    function clampOffsets(scale) {
        const imgW = cropperImg.width * scale;
        const imgH = cropperImg.height * scale;
        const minX = (cropperCanvas.width - imgW) / 2;
        const minY = (cropperCanvas.height - imgH) / 2;
        const maxX = -minX;
        const maxY = -minY;

        cropperState.offsetX = Math.min(Math.max(cropperState.offsetX, minX), maxX);
        cropperState.offsetY = Math.min(Math.max(cropperState.offsetY, minY), maxY);
    }

    function drawCropper() {
        if (!cropperState || !cropperImg) return;
        const scale = cropperState.baseScale * cropperState.zoom;
        clampOffsets(scale);

        const imgW = cropperImg.width * scale;
        const imgH = cropperImg.height * scale;
        const drawX = (cropperCanvas.width - imgW) / 2 + cropperState.offsetX;
        const drawY = (cropperCanvas.height - imgH) / 2 + cropperState.offsetY;

        cropperCtx.clearRect(0, 0, cropperCanvas.width, cropperCanvas.height);
        cropperCtx.drawImage(cropperImg, drawX, drawY, imgW, imgH);
    }

    cropperZoom.addEventListener('input', () => {
        if (!cropperState) return;
        cropperState.zoom = Number(cropperZoom.value);
        drawCropper();
    });

    cropperCanvas.addEventListener('mousedown', (e) => {
        if (!cropperState) return;
        isDragging = true;
        dragStart = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging || !cropperState) return;
        const dx = e.clientX - dragStart.x;
        const dy = e.clientY - dragStart.y;
        dragStart = { x: e.clientX, y: e.clientY };
        cropperState.offsetX += dx;
        cropperState.offsetY += dy;
        drawCropper();
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
    });

    cropperCancel.addEventListener('click', () => {
        if (cropperState && cropperState.inputEl) {
            cropperState.inputEl.value = '';
        }
        hideCropper();
    });

    cropperApply.addEventListener('click', () => {
        if (!cropperState) return;
        const currentState = cropperState;
        const uploadState = ensureUploadState(currentState.config);
        cropperApply.disabled = true;
        cropperCanvas.toBlob((blob) => {
            if (!blob) {
                cropperApply.disabled = false;
                return;
            }
            const uploadToken = uploadState.token + 1;
            uploadState.token = uploadToken;
            uploadState.pending = true;
            const formData = new FormData();
            formData.append('file', blob, 'crop.webp');
            const localFile = new File([blob], 'crop.webp', { type: 'image/webp' });
            const hiddenField = document.getElementById(currentState.config.fieldId);

            showLocalPreview(currentState.config, localFile);
            if (hiddenField) {
                hiddenField.value = '';
            }
            setUploadStatus(currentState.config, 'Uploading in background...', false);
            if (currentState.inputEl) {
                currentState.inputEl.value = '';
            }
            hideCropper();
            cropperApply.disabled = false;

            let uploadPromise = fetch(currentState.config.url, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRF-TOKEN': document.querySelector('input[name="_csrf"]').value
                }
            })
                .then(res => {
                    if (!res.ok) {
                        throw new Error('Upload failed with status ' + res.status);
                    }
                    return res.text();
                })
                .then(src => {
                    if (uploadState.token !== uploadToken) {
                        return src;
                    }
                    showUploadedPreview(currentState.config, src);
                    if (hiddenField) {
                        hiddenField.value = src;
                    }
                    setUploadStatus(currentState.config, 'Uploaded.', false);
                    return src;
                })
                .catch(err => {
                    if (uploadState.token === uploadToken) {
                        setUploadStatus(currentState.config, 'Upload failed. Try again.', true);
                    }
                    console.error('Upload failed', err);
                    throw err;
                })
                .finally(() => {
                    if (uploadState.token === uploadToken) {
                        uploadState.pending = false;
                        if (uploadState.promise === uploadPromise) {
                            uploadState.promise = null;
                        }
                    }
                });

            uploadState.promise = uploadPromise;
        }, 'image/webp', 0.92);
    });

    if (onboardingForm) {
        onboardingForm.addEventListener('submit', async (event) => {
            const pendingUploads = Object.values(uploadStates)
                .filter((state) => state.pending && state.promise)
                .map((state) => state.promise);

            if (!pendingUploads.length) {
                return;
            }

            event.preventDefault();

            try {
                await Promise.all(pendingUploads);
                onboardingForm.submit();
            } catch (error) {
                console.error('Pending upload failed', error);
            }
        });
    }
</script>
<style>
    .onboarding-media {
        align-items: start;
        margin-bottom: 8px;
    }

    .image-section {
        display: grid;
        gap: 10px;
    }

    .upload-status {
        min-height: 20px;
        margin: 0;
        color: #64748b;
        font-size: 13px;
    }

    .upload-status--error {
        color: #b91c1c;
    }

    .field-label {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text);
    }

    .media-preview {
        border: 1px solid var(--border);
        background: #f8fafc;
        overflow: hidden;
    }

    .media-preview--cover {
        border-radius: 18px;
        min-height: 148px;
    }

    .media-preview--avatar {
        width: 160px;
        height: 160px;
        border-radius: 50%;
    }

    .preview-avatar {
        width: 160px;
        height: 160px;
        object-fit: cover;
        display: block;
    }

    .preview-cover {
        width: 100%;
        min-height: 148px;
        max-height: 220px;
        object-fit: cover;
        display: block;
    }

    .cropper-modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.55);
        display: grid;
        place-items: center;
        z-index: 2000;
        padding: 20px;
    }

    .cropper-modal.hidden {
        display: none;
    }

    .cropper-dialog {
        width: min(760px, 100%);
        background: #ffffff;
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.2);
        padding: 16px;
        display: grid;
        gap: 12px;
    }

    .cropper-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
    }

    .cropper-body {
        display: grid;
        place-items: center;
        background: #f8fafc;
        border-radius: 12px;
        padding: 12px;
        border: 1px solid var(--border);
    }

    #cropper-canvas {
        max-width: 100%;
        border-radius: 12px;
        background: #ffffff;
        cursor: grab;
    }

    #cropper-canvas:active {
        cursor: grabbing;
    }

    .cropper-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
    }

    .cropper-zoom {
        display: grid;
        gap: 6px;
        min-width: min(280px, 100%);
    }

    .cropper-zoom input {
        width: 100%;
    }

    @media (max-width: 720px) {
        .media-preview--avatar {
            width: 132px;
            height: 132px;
        }

        .preview-avatar {
            width: 132px;
            height: 132px;
        }
    }
</style>
</body>
</html>
