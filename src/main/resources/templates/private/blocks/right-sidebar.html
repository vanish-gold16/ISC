<aside class="sidebar-right" th:fragment="rightSidebar(active)">
    <link rel="stylesheet" href="/css/private/blocks/right-sidebar.css" />
    <div class="card card--sticky nav-card">
        <div class="nav-title">Navigation</div>

        <nav class="nav">
            <a class="nav__item"
               th:href="@{/post}"
               th:classappend="${active}=='post' ? ' is-active' : ''">
                <img class="nav__icon" th:src="@{/images/private/sidebar-icons/post.png}" src="/images/private/sidebar-icons/post.png" alt="" aria-hidden="true" />
                <span class="nav__label">New Post</span>
            </a>

            <a class="nav__item"
               th:href="@{/profile}"
               th:classappend="${active}=='profile' ? ' is-active' : ''">
                <img class="nav__icon" th:src="@{/images/private/sidebar-icons/profile.png}" src="/images/private/sidebar-icons/profile.png" alt="" aria-hidden="true" />
                <span class="nav__label">Profile</span>
                </a>

            <a class="nav__item"
               th:href="@{/home}"
               th:classappend="${active}=='home' ? ' is-active' : ''">
                <img class="nav__icon" th:src="@{/images/private/sidebar-icons/home.png}" src="/images/private/sidebar-icons/home.png" alt="" aria-hidden="true" />
                <span class="nav__label">Home</span>
                </a>

            <a class="nav__item"
               th:href="@{/messages}"
               th:classappend="${active}=='messages' ? ' is-active' : ''">
                <span class="nav__icon-wrap">
                    <img class="nav__icon" th:src="@{/images/private/sidebar-icons/messages.png}" src="/images/private/sidebar-icons/messages.png" alt="" aria-hidden="true" />
                    <span class="nav__badge"
                          data-messages-unread-badge
                          th:with="messagesUnread=${unreadMessages != null ? unreadMessages : 0}"
                          th:text="${messagesUnread > 99 ? '99+' : messagesUnread}"
                          th:attr="data-server-unread=${messagesUnread},hidden=${messagesUnread > 0} ? null : 'hidden'">0</span>
                </span>
                <span class="nav__label">Messages</span>
                </a>

            <a class="nav__item"
               th:href="@{/scholar-hub}"
               th:classappend="${active}=='scholarhub' ? ' is-active' : ''">
                <img class="nav__icon" th:src="@{/images/private/sidebar-icons/scholarhub.png}" src="/images/private/sidebar-icons/scholarhub.png" alt="" aria-hidden="true" />
                <span class="nav__label">ScholarHub</span>
            </a>

            <a class="nav__item"
               th:href="@{/friends}"
               th:classappend="${active}=='friends' ? ' is-active' : ''">
                <img class="nav__icon" th:src="@{/images/private/sidebar-icons/friends.png}" src="/images/private/sidebar-icons/friends.png" alt="" aria-hidden="true" />
                <span class="nav__label">Friends</span>
            </a>

            <a class="nav__item"
               th:if="${isAdmin}"
               th:href="@{/admin}"
               th:classappend="${active}=='admin' ? ' is-active' : ''">
                <span class="nav__icon nav__icon--admin" aria-hidden="true">A</span>
                <span class="nav__label">Admin Panel</span>
            </a>
        </nav>
    </div>
    <script>
        (function () {
            const badge = document.querySelector('[data-messages-unread-badge]');
            if (!badge) return;

            const STORAGE_KEY = 'isc.messagesUnreadCount';

            function normalizeCount(value) {
                const count = Number(value);
                return Number.isFinite(count) && count > 0 ? Math.floor(count) : 0;
            }

            function render(count) {
                const normalized = normalizeCount(count);
                if (normalized > 0) {
                    badge.hidden = false;
                    badge.textContent = normalized > 99 ? '99+' : String(normalized);
                } else {
                    badge.hidden = true;
                    badge.textContent = '0';
                }
            }

            const serverUnread = normalizeCount(badge.getAttribute('data-server-unread'));
            if (serverUnread > 0) {
                try {
                    window.localStorage.setItem(STORAGE_KEY, String(serverUnread));
                } catch (e) {
                    // Ignore storage access issues and keep the server-rendered value.
                }
                render(serverUnread);
                return;
            }

            try {
                render(window.localStorage.getItem(STORAGE_KEY));
            } catch (e) {
                render(0);
            }

            window.addEventListener('storage', (event) => {
                if (event.key === STORAGE_KEY) {
                    render(event.newValue);
                }
            });
        })();
    </script>
</aside>
