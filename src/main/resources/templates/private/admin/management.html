<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" href="/favicon.png" />
    <title th:text="${title} ?: 'ISC | Admin panel'">ISC | Admin panel</title>
    <link rel="stylesheet" th:href="@{/css/private/admin/management.css}" href="/css/private/admin/management.css" />
</head>
<body>
<main class="admin-shell">
    <div class="admin-topbar">
        <div class="admin-user-chip">
            <div class="admin-user-copy">
                <span class="admin-user-greeting"
                      th:text="${user != null && user.username != null ? 'Hello, ' + user.username : 'Hello, user'}">Hello, user</span>
            </div>
            <img class="admin-user-avatar"
                 th:src="${userAvatarUrl} ?: '/images/private/profile/common-profile.png'"
                 src="/images/private/profile/common-profile.png"
                 alt="User avatar" />
        </div>
    </div>
</main>
</body>
</html>
