<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" href="/favicon.png" />
    <title th:text="${title} ?: 'ISC | Admin panel'">ISC | Admin panel</title>
    <link rel="stylesheet" th:href="@{/css/private/home.css}" href="/css/private/home.css" />
    <link rel="stylesheet" th:href="@{/css/private/admin/management.css}" href="/css/private/admin/management.css" />
</head>
<body>
<header th:replace="~{private/blocks/private-header :: header}"></header>

<main class="container page admin-page">
    <section class="admin-main">
        <article class="card admin-hero">
            <div class="admin-hero__body">
                <p class="admin-hero__eyebrow">Admin Panel</p>
                <h1 class="admin-hero__title"
                    th:text="${user != null && user.username != null ? 'Hello, ' + user.username : 'Hello, user'}">Hello, user</h1>
                <p class="admin-hero__subtitle">Welcome to the admin workspace.</p>
                <div class="admin-widget-grid">
                    <a class="admin-widget"
                       th:classappend="${adminSection == 'new-reviews'} ? ' is-active' : ''"
                       th:href="@{/admin/new-reviews}">
                        <span class="admin-widget__eyebrow">Admin</span>
                        <span class="admin-widget__title">New Reviews</span>
                    </a>
                    <a class="admin-widget"
                       th:classappend="${adminSection == 'new-arts'} ? ' is-active' : ''"
                       th:href="@{/admin/new-arts}">
                        <span class="admin-widget__eyebrow">Admin</span>
                        <span class="admin-widget__title">New Arts</span>
                    </a>
                </div>
            </div>
        </article>
    </section>

    <aside th:replace="~{/private/blocks/right-sidebar :: rightSidebar('admin')}"></aside>
</main>

<footer th:replace="~{private/blocks/private-footer :: footer}"></footer>
</body>
</html>
