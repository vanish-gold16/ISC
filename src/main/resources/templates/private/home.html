<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" href="/favicon.png" />

    <title th:text="${title} ?: 'ISC | Home'">ISC | Home</title>

    <link rel="stylesheet" href="/css/private/home.css" />
</head>

<body>
<header th:replace="~{private/blocks/private-header :: header}"></header>

<main class="container page">
    <section class="feed">
        <div class="feed__title">
            <h1>Home</h1>
            <p class="muted">Latest posts from people you follow.</p>
        </div>

        <article class="post card" th:each="p : ${posts}" th:attr="data-post-url=@{/posts/{id}(id=${p.id})}" role="link" tabindex="0">
            <div class="post__header">
                <div class="avatar">
                    <img class="avatar__img"
                         th:src="${p.user != null and p.user.profile != null and p.user.profile.avatarUrl != null}
                                 ? ${p.user.profile.avatarUrl}
                                 : '/images/private/profile/common-profile.png'"
                         alt="" />
                </div>
                <div class="post__meta">
                    <div class="post__name"
                         th:text="${p.user != null ? (p.user.firstName + ' ' + p.user.lastName) : 'ISC Member'}">ISC Member</div>
                    <div class="post__sub muted">
                        <span th:text="${p.user != null && p.user.username != null ? '@' + p.user.username : '@user'}">@user</span>
                    </div>
                </div>
                <button class="icon-btn" aria-label="More" type="button"><span class="icon">...</span></button>
            </div>

            <div class="post__content">
                <img class="post__image" th:if="${p.photoUrl != null}" th:src="${p.photoUrl}" alt="" />
                <h3 class="post__title" th:if="${p.title != null}" th:text="${p.title}">Title</h3>
                <p th:text="${p.body}">Post content</p>
            </div>

            <div class="post__footer">
                <form class="action-form" method="post" th:action="@{/posts/{id}/like(id=${p.id})}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button class="action action--like" type="submit" aria-label="Like">
                        <img class="action__icon"
                             th:src="${p.liked} ? '/images/private/icons/liked.png' : '/images/private/icons/like.png'"
                             src="/images/private/icons/like.png"
                             alt="" />
                        <span class="action__count" th:text="${p.likesCount} ?: 0">0</span>
                    </button>
                </form>
                <button class="action" type="button" aria-label="Comment">
                    <img class="action__icon" src="/images/private/icons/comment.png" alt="" />
                    <span class="action__count" th:text="${p.commentsCount} ?: 0">0</span>
                </button>
                <button class="action action--share" type="button" aria-label="Share">
                    <img class="action__icon" src="/images/private/icons/share.png" alt="" />
                    <span class="action__count" th:text="${p.sharesCount} ?: 0">0</span>
                </button>
            </div>
            <div class="post__date muted" th:text="${p.date != null ? #temporals.format(p.date, 'dd MMM yyyy') : 'just now'}">just now</div>
        </article>

        <div class="card empty" th:if="${posts == null or #lists.isEmpty(posts)}">
            <h3>No posts yet</h3>
            <p class="muted">Follow people to see their updates here.</p>
        </div>
    </section>

    <aside th:replace="~{/private/blocks/right-sidebar :: rightSidebar('home')}"></aside>
</main>

<footer th:replace="~{private/blocks/private-footer :: footer}"></footer>
<script>
    (function () {
        const posts = Array.from(document.querySelectorAll('.post[data-post-url]'));
        if (!posts.length) return;
        const ignoreSelector = '.action-form, .action--like, .action--share, .icon-btn, a, form, input, textarea';
        posts.forEach(post => {
            const url = post.getAttribute('data-post-url');
            if (!url) return;
            post.addEventListener('click', (e) => {
                if (e.target.closest(ignoreSelector)) return;
                window.location.href = url;
            });
            post.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    window.location.href = url;
                }
            });
        });
    })();
</script>
</body>
</html>
