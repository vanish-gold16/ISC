<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" href="/favicon.png" />

    <title th:text="${title} ?: 'ISC | ScholarHub'">ISC | ScholarHub</title>

    <link rel="stylesheet" href="/css/private/scholar-hub-setup.css" />
</head>
<body>
<header th:replace="~{private/blocks/private-header :: header}"></header>

<main class="container setup-page">
    <div class="setup-shell">
        <section class="setup-main">
            <section class="setup-layout">
                <div class="hub-preview-stage">
                    <a class="hub-preview-card" id="schedule-preview" th:href="@{/scholar-hub/schedule}" href="/scholar-hub/schedule" aria-label="Open full schedule">
                        <div class="hub-preview-card__head">
                            <div>
                                <p class="planner__eyebrow">Schedule preview</p>
                                <h2>Weekly rectangle</h2>
                            </div>
                            <div class="hub-preview-card__meta">
                                <span class="hub-preview-card__badge" th:text="${schedule.totalLessons} + ' lessons'">0 lessons</span>
                                <span class="hub-preview-card__hint">Click to open full view</span>
                            </div>
                        </div>

                        <div class="hub-timetable hub-timetable--rows">
                            <article class="hub-timetable__day-row" th:each="day : ${schedule.days}">
                                <header class="hub-timetable__day-label">
                                    <p class="hub-timetable__day-short" th:text="${day.shortLabel}">Mon</p>
                                    <h3 th:text="${day.label}">Monday</h3>
                                </header>

                                <div class="hub-timetable__day-track" th:style="'--slot-count:' + ${schedule.maxLessonSlots}">
                                    <th:block th:each="lesson : ${day.lessons}">
                                        <div class="hub-timetable__cell hub-timetable__cell--empty"
                                             th:if="${lesson.empty}"></div>

                                        <div class="hub-timetable__cell hub-timetable__cell--filled"
                                             th:if="${!lesson.empty}"
                                             th:style="${lesson.color != null ? '--preview-accent:' + lesson.color : ''}">
                                            <div class="hub-timetable__cell-top">
                                                <span class="hub-timetable__order"
                                                      th:text="${lesson.lessonOrder != null ? '#' + lesson.lessonOrder : '#'}">#1</span>
                                                <span class="hub-timetable__room"
                                                      th:text="${lesson.room != null ? lesson.room : 'Room'}">Room</span>
                                            </div>
                                            <p class="hub-timetable__name"
                                               th:text="${lesson.shortName != null ? lesson.shortName : lesson.subjectName}">Math</p>
                                            <p class="hub-timetable__teacher"
                                               th:text="${lesson.teacherName != null ? lesson.teacherName : 'Teacher'}">Teacher</p>
                                        </div>
                                    </th:block>
                                </div>
                            </article>
                        </div>
                    </a>
                </div>
            </section>
        </section>

        <aside th:replace="~{/private/blocks/right-sidebar :: rightSidebar('scholarhub')}"></aside>
    </div>
</main>

<footer th:replace="~{private/blocks/private-footer :: footer}"></footer>
</body>
</html>
