<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" href="/favicon.png" />

    <title th:text="${title} ?: 'ISC | Messenger'">ISC | Messenger</title>

    <link rel="stylesheet" href="/css/private/home.css" />
    <link rel="stylesheet" href="/css/private/messenger.css" />

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body th:attr="data-conversation-id=${activeConversationId},data-current-user-id=${currentUserId}">
<header th:replace="~{private/blocks/private-header :: header}"></header>

<main class="container messenger-layout">
    <div class="messenger-page">
        <section class="messenger-panel messenger-sidebar">
            <div class="sidebar-head">
                <h2 class="sidebar-title">Messenger</h2>
                <span class="sidebar-pill"
                      th:text="${conversations != null ? #lists.size(conversations) + ' chats' : '0 chats'}">0 chats</span>
            </div>
            <div class="sidebar-search">
                <input type="search" placeholder="Search messages..." aria-label="Search messages" />
            </div>
            <div class="conversation-list" th:if="${conversations != null and !#lists.isEmpty(conversations)}">
                <a class="conversation-item"
                   th:each="c : ${conversations}"
                   th:href="@{/messages/c/{id}(id=${c.id})}"
                   th:classappend="${activeConversation != null and activeConversation.id == c.id} ? ' is-active' : ''"
                   th:attr="data-last-ts=${c['lastMessageAt']}"
                   data-conversation-item>
                    <img class="conversation-avatar" th:src="${c.avatar}" alt="" />
                    <div class="conversation-body">
                        <div class="conversation-name">
                            <span th:text="${c.name}">Name</span>
                            <span class="friend-badge" th:if="${c.friend}">Friend</span>
                            <span class="status-dot" th:classappend="${c.online} ? ' is-online' : ''"></span>
                        </div>
                        <p class="conversation-preview" th:text="${c.lastMessage}">Preview</p>
                    </div>
                    <div class="conversation-meta">
                        <span th:text="${c.time}">Now</span>
                        <span class="conversation-unread" th:if="${c.unread > 0}"
                              th:text="${c.unread}">1</span>
                    </div>
                </a>
            </div>
            <div class="conversation-empty" th:if="${conversations == null or #lists.isEmpty(conversations)}">
                <h3>No conversations</h3>
                <p>Start a chat from a profile page.</p>
            </div>
        </section>

        <section class="messenger-panel messenger-chat" th:if="${activeConversation != null}">
            <div class="chat-head">
                <div class="chat-head-left">
                    <img class="chat-avatar" th:src="${activeConversation.avatar}" alt="" />
                    <div>
                        <h2 class="chat-title" th:text="${activeConversation.name}">Active chat</h2>
                        <p class="chat-subtitle" th:text="${activeConversation.subtitle}">Subtitle</p>
                        <div class="chat-status">
                            <span class="status-dot" th:classappend="${activeConversation.online} ? ' is-online' : ''"></span>
                            <span th:text="${activeConversation.online} ? 'Online now' : 'Offline'">Online now</span>
                            <span class="friend-badge" th:if="${activeConversation.friend}">Friend</span>
                        </div>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="ghost-btn" type="button">Profile</button>
                    <button class="ghost-btn" type="button">Search</button>
                    <button class="ghost-btn" type="button">More</button>
                </div>
            </div>

            <div class="chat-thread" id="chat-thread" th:classappend="${messages == null or #lists.isEmpty(messages)} ? ' is-hidden' : ''">
                <div class="message-row"
                     th:each="m : ${messages}"
                     th:classappend="${m['fromMe']} ? ' message-row--me' : ''">
                    <div class="message"
                         th:classappend="${m['fromMe']} ? ' message--me' : ' message--them'"
                         th:attr="data-sent-at=${m['sentAt']},data-sender-id=${m['senderId']}">
                        <div class="message__sender"
                             th:if="${!m['fromMe'] and activeConversation.type != 'DIRECT'}"
                             th:text="${m['senderName']}">Sender</div>
                        <div class="message__bubble" th:text="${m['text']}">Message</div>
                    </div>
                    <div class="message-actions">
                        <span class="message-time" th:text="${m['time']}">18:21</span>
                        <button class="message-action" type="button"
                                th:if="${m['fromMe']}" aria-label="Edit message">
                            <img class="message-action__icon" src="/images/private/icons/edit.png" alt="" />
                        </button>
                        <button class="message-action message-action--danger" type="button"
                                th:if="${m['fromMe']}" aria-label="Delete message">
                            <img class="message-action__icon" src="/images/private/icons/delete.png" alt="" />
                        </button>
                    </div>
                </div>
            </div>

            <div class="chat-empty" id="chat-empty" th:classappend="${messages != null and !#lists.isEmpty(messages)} ? ' is-hidden' : ''">
                <h3>No messages yet</h3>
                <p>Say hi to start the conversation.</p>
            </div>

            <div class="chat-composer">
                <div class="composer-row">
                    <textarea placeholder="Write a message..." rows="2"></textarea>
                    <button class="send-btn" type="button">Send</button>
                </div>
            </div>
        </section>
        <section class="messenger-panel messenger-chat messenger-chat--empty" th:if="${activeConversation == null}">
            <div class="chat-empty">
                <img class="chat-empty-logo" src="/images/private/sidebar-icons/messages.png" alt="" />
                <h3>Select a conversation</h3>
                <p>Choose a chat on the left or start one from a profile page.</p>
            </div>
        </section>
    </div>
    <aside th:replace="~{/private/blocks/right-sidebar :: rightSidebar('messages')}"></aside>
</main>

<footer th:replace="~{private/blocks/private-footer :: footer}"></footer>

<script>
    (function () {
        const items = Array.from(document.querySelectorAll('[data-conversation-item]'));
        if (!items.length) return;
        items.forEach(item => item.addEventListener('click', () => {
            items.forEach(el => el.classList.remove('is-active'));
            item.classList.add('is-active');
        }));
    })();
</script>
<script>
    (function () {
        const body = document.body;
        const conversationId = body ? body.getAttribute('data-conversation-id') : null;
        const currentUserIdRaw = body ? body.getAttribute('data-current-user-id') : null;
        const currentUserId = currentUserIdRaw ? Number(currentUserIdRaw) : null;
        const thread = document.getElementById('chat-thread');
        const emptyState = document.getElementById('chat-empty');
        const composer = document.querySelector('.chat-composer');
        const textarea = composer ? composer.querySelector('textarea') : null;
        const sendBtn = composer ? composer.querySelector('.send-btn') : null;
        const conversationItems = Array.from(document.querySelectorAll('[data-conversation-item]'));
        const lastActivity = new Map();
        let lastDayKey = null;
        const GAP_MINUTES = 20;

        if (thread && !thread.classList.contains('is-hidden')) {
            requestAnimationFrame(() => {
                thread.scrollTop = thread.scrollHeight;
            });
        }
        initConversationSorting();
        insertDayDividersFromMessages();
        applyMessageSpacing();

        if (!conversationId || !window.SockJS || !window.Stomp) return;

        const socket = new SockJS('/ws');
        const stomp = Stomp.over(socket);
        stomp.debug = null;

        stomp.connect({}, () => {
            stomp.subscribe('/topic/conversation.' + conversationId, (frame) => {
                if (!frame || !frame.body) return;
                try {
                    const msg = JSON.parse(frame.body);
                    const fromMe = currentUserId != null && msg && Number(msg.senderId) === currentUserId;
                    if (fromMe) return;
                    appendMessage(msg, false);
                } catch (e) {
                    appendMessage({ body: String(frame.body || '') }, false);
                }
            });
        });

        if (!textarea || !sendBtn) return;

        function send() {
            const text = (textarea.value || '').trim();
            if (!text) return;
            stomp.send('/app/chat/' + conversationId, {}, JSON.stringify({ body: text }));
            appendMessage({ body: text, senderId: currentUserId }, true);
            textarea.value = '';
        }

        sendBtn.addEventListener('click', send);
        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });

        function appendMessage(msg, fromMe) {
            if (!thread) return;
            if (emptyState) emptyState.classList.add('is-hidden');
            thread.classList.remove('is-hidden');
            ensureDayDivider();
            const now = new Date();
            const row = document.createElement('div');
            row.className = 'message-row' + (fromMe ? ' message-row--me' : '');

            const message = document.createElement('div');
            message.className = 'message' + (fromMe ? ' message--me' : ' message--them');
            message.setAttribute('data-sent-at', now.toISOString());
            const senderId = msg && msg.senderId ? String(msg.senderId) : (fromMe && currentUserId != null ? String(currentUserId) : '');
            if (senderId) {
                message.setAttribute('data-sender-id', senderId);
            }

            const bubble = document.createElement('div');
            bubble.className = 'message__bubble';
            bubble.textContent = msg && msg.body ? msg.body : '';
            message.appendChild(bubble);

            const actions = document.createElement('div');
            actions.className = 'message-actions';
            const time = document.createElement('span');
            time.className = 'message-time';
            time.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            actions.appendChild(time);
            if (fromMe) {
                const edit = document.createElement('button');
                edit.type = 'button';
                edit.className = 'message-action';
                edit.setAttribute('aria-label', 'Edit message');
                const editIcon = document.createElement('img');
                editIcon.className = 'message-action__icon';
                editIcon.src = '/images/private/icons/edit.png';
                editIcon.alt = '';
                edit.appendChild(editIcon);

                const del = document.createElement('button');
                del.type = 'button';
                del.className = 'message-action message-action--danger';
                del.setAttribute('aria-label', 'Delete message');
                const delIcon = document.createElement('img');
                delIcon.className = 'message-action__icon';
                delIcon.src = '/images/private/icons/delete.png';
                delIcon.alt = '';
                del.appendChild(delIcon);

                actions.appendChild(edit);
                actions.appendChild(del);
            }

            row.appendChild(message);
            row.appendChild(actions);

            thread.appendChild(row);
            thread.scrollTop = thread.scrollHeight;
            applyMessageSpacing();

            const text = msg && msg.body ? msg.body : '';
            updateConversationPreview(text, now);
        }

        function ensureDayDivider() {
            const now = new Date();
            const dayKey = now.toISOString().slice(0, 10);
            if (lastDayKey === dayKey) return;
            lastDayKey = dayKey;
            const divider = document.createElement('div');
            divider.className = 'chat-date-separator';
            const inner = document.createElement('span');
            inner.className = 'chat-day';
            inner.textContent = formatDayLabel(now);
            divider.appendChild(inner);
            thread.appendChild(divider);
        }

        function formatDayLabel(date) {
            const now = new Date();
            const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const startOfThatDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            const diffDays = Math.round((startOfToday - startOfThatDay) / 86400000);
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays === 2) return 'The day before yesterday';
            return date.toLocaleDateString([], { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function updateConversationPreview(text, time) {
            const item = conversationItems.find(el => String(el.getAttribute('href') || '').includes('/' + conversationId));
            if (!item) return;

            const preview = item.querySelector('.conversation-preview');
            if (preview) {
                preview.textContent = text || 'New message';
            }

            const metaTime = item.querySelector('.conversation-meta span');
            if (metaTime) {
                metaTime.textContent = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            const ts = time.getTime();
            lastActivity.set(item, ts);
            item.setAttribute('data-last-ts', String(ts));
            sortConversationList();
        }

        function initConversationSorting() {
            if (!conversationItems.length) return;
            conversationItems.forEach(item => {
                const raw = item.getAttribute('data-last-ts');
                const ts = raw ? Number(raw) : 0;
                lastActivity.set(item, Number.isFinite(ts) ? ts : 0);
            });
            sortConversationList();
        }

        function sortConversationList() {
            if (!conversationItems.length) return;
            conversationItems.forEach(item => {
                if (!lastActivity.has(item)) {
                    lastActivity.set(item, 0);
                }
            });
            const sorted = [...conversationItems].sort((a, b) => (lastActivity.get(b) || 0) - (lastActivity.get(a) || 0));
            const list = sorted[0] ? sorted[0].parentElement : null;
            if (!list) return;
            sorted.forEach(item => list.appendChild(item));
        }

        function insertDayDividersFromMessages() {
            if (!thread) return;
            const messages = Array.from(thread.querySelectorAll('.message'));
            if (!messages.length) return;
            const existing = thread.querySelectorAll('.chat-day');
            existing.forEach(el => el.remove());
            let prevDayKey = null;
            messages.forEach(message => {
                const raw = message.getAttribute('data-sent-at');
                if (!raw) return;
                const date = new Date(raw);
                if (Number.isNaN(date.getTime())) return;
                const dayKey = date.toISOString().slice(0, 10);
                if (prevDayKey !== dayKey) {
                    const divider = document.createElement('div');
                    divider.className = 'chat-date-separator';
                    const inner = document.createElement('span');
                    inner.className = 'chat-day';
                    inner.textContent = formatDayLabel(date);
                    divider.appendChild(inner);
                    thread.insertBefore(divider, message.parentElement || message);
                }
            });
            const lastMessageWithDate = [...messages].reverse().find(m => m.getAttribute('data-sent-at'));
            if (lastMessageWithDate) {
                const date = new Date(lastMessageWithDate.getAttribute('data-sent-at'));
                if (!Number.isNaN(date.getTime())) {
                    lastDayKey = date.toISOString().slice(0, 10);
                }
            }
        }

        function applyMessageSpacing() {
            if (!thread) return;
            const nodes = Array.from(thread.querySelectorAll('.message'));
            if (!nodes.length) return;
            let prev = null;
            nodes.forEach(node => {
                node.classList.remove('message--time-gap');
                const row = node.closest('.message-row');
                if (row) row.classList.remove('message-row--time-gap');
                if (!prev) {
                    prev = node;
                    return;
                }
                const sameSender = getSenderKey(node) === getSenderKey(prev);
                const prevAtRaw = prev.getAttribute('data-sent-at');
                const curAtRaw = node.getAttribute('data-sent-at');
                const prevAt = prevAtRaw ? new Date(prevAtRaw).getTime() : NaN;
                const curAt = curAtRaw ? new Date(curAtRaw).getTime() : NaN;
                const diffMin = Number.isFinite(prevAt) && Number.isFinite(curAt)
                    ? Math.abs(curAt - prevAt) / 60000
                    : 0;
                if (sameSender && diffMin >= GAP_MINUTES) {
                    node.classList.add('message--time-gap');
                    if (row) row.classList.add('message-row--time-gap');
                }
                prev = node;
            });
        }

        function getSenderKey(node) {
            const id = node.getAttribute('data-sender-id');
            if (id) return id;
            if (node.classList.contains('message--me')) return 'me';
            const senderEl = node.querySelector('.message__sender');
            if (senderEl && senderEl.textContent) {
                return 'name:' + senderEl.textContent.trim();
            }
            return 'them';
        }
    })();
</script>
</body>
</html>
